[workspace]
resolver = "2"
members = [
  "apps/remote-hub",
  "crates/domain-context",
  "crates/execution",
  "crates/governance",
  "crates/interop-mcp",
  "crates/knowledge",
  "crates/observe-artifact",
  "crates/runtime",
]

[workspace.package]
edition = "2021"

[workspace.dependencies]
async-trait = "0.1.89"
axum = "0.8.6"
chrono = { version = "0.4.42", features = ["serde"] }
chrono-tz = "0.10.4"
cron = "0.15.0"
futures-util = "0.3.31"
http-body-util = "0.1.3"
jsonschema = "0.18.3"
reqwest = { version = "0.12.28", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.10.9"
sqlx = { version = "0.7.4", features = ["runtime-tokio", "sqlite", "migrate"] }
tempfile = "3.23.0"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "net", "rt-multi-thread", "time"] }
tower = "0.5.2"
uuid = { version = "1.18.1", features = ["v4", "serde"] }
walkdir = "2.5.0"
