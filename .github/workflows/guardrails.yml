name: Repository Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required docs
        run: |
          required_files=(
            AGENTS.md
            README.md
            docs/PRD.md
            docs/SAD.md
            docs/CONTRACTS.md
            docs/ENGINEERING_STANDARD.md
            docs/VIBECODING.md
            docs/adr/README.md
            .github/pull_request_template.md
          )
          for file in "${required_files[@]}"; do
            test -e "$file"
          done

      - name: Fail on stale doc references
        run: |
          targets=(
            README.md
            AGENTS.md
            docs
            .github/pull_request_template.md
          )
          ! grep -Rni "docs/DEVELOPMENT_STANDARDS.md" "${targets[@]}"
          ! grep -RniE "docs/(ARCHITECTURE|DOMAIN|DATA_MODEL|VISUAL_FRAMEWORK)\\.md|docs/API/|docs/plans/|docs/changes/" "${targets[@]}"
          ! grep -Rni "no[v]ai-" "${targets[@]}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate workspace skeleton
        run: |
          pnpm run typecheck:web
          pnpm run test:web
          pnpm run build:web
          cargo test --workspace
          cargo build --workspace
