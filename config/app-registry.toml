[[apps]]
id = "octopus-desktop"
name = "Octopus Desktop"
platform = "desktop"
status = "active"
firstParty = true
allowedOrigins = []
allowedHosts = [
    "127.0.0.1",
    "localhost",
]
sessionPolicy = "session_token"
defaultScopes = [
    "workspace",
    "runtime",
]

[[apps]]
id = "octopus-web"
name = "Octopus Web"
