name: Repository Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required docs
        run: |
          required_files=(
            AGENTS.md
            README.md
            docs/PRD.md
            docs/SAD.md
            docs/ARCHITECTURE.md
            docs/DOMAIN.md
            docs/DATA_MODEL.md
            docs/ENGINEERING_STANDARD.md
            docs/VIBECODING.md
            docs/VISUAL_FRAMEWORK.md
            docs/API/README.md
            docs/API/AGENTS.md
            docs/adr/README.md
            docs/plans/README.md
            docs/plans/2026-03-25-product-development-master-plan.md
            docs/plans/2026-03-25-m00-doc-truth-and-governance-repair.md
            docs/plans/2026-03-25-m01-architecture-and-runtime-contract-freeze.md
            docs/plans/2026-03-25-m02-identity-workspace-model-and-secret-foundation.md
            docs/plans/2026-03-25-m03-execution-plane-and-capability-governance-foundation.md
            docs/plans/2026-03-25-m04-agent-context-and-memory.md
            docs/plans/2026-03-25-m05-team-task-approval-and-recovery.md
            docs/plans/2026-03-25-m06-discussion-engine.md
            docs/plans/2026-03-25-m07-surface-shells-and-governance-ui.md
            docs/plans/2026-03-25-m08-blueprint-import-export-templates-and-console.md
            docs/plans/2026-03-25-m09-security-observability-and-operations.md
            docs/plans/2026-03-25-m10-advanced-backlog.md
            docs/changes/README.md
            docs/changes/2026-03-25-planning-governance-unification.md
            docs/changes/2026-03-25-contract-and-repo-baseline.md
            .github/pull_request_template.md
          )
          for file in "${required_files[@]}"; do
            test -e "$file"
          done

      - name: Fail on stale doc references
        run: |
          ! grep -Rni "docs/DEVELOPMENT_STANDARDS.md" README.md AGENTS.md docs .github/pull_request_template.md docs/changes/TEMPLATE.md
          ! grep -RniE "2026-03-24-v1-development-roadmap|2026-03-24-phase-(0-planning-and-tracking|1-contract-sources|2-monorepo-scaffolding|3-mvp-vertical-slice)|2026-03-25-phase-1-mvp-roadmap|2026-03-25-phase-0-planning-and-tracking" README.md AGENTS.md docs .github/pull_request_template.md docs/changes/TEMPLATE.md
          ! grep -nE "^## 里程碑 [A-K]：" docs/plans/2026-03-25-product-development-master-plan.md
