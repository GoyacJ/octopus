name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  desktop-quality-gates:
    name: Desktop quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check desktop frontend surfaces
        run: pnpm check:desktop

      - name: Prepare desktop sidecar for Rust workspace checks
        run: pnpm prepare:desktop-backend:sidecar

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Check Rust linting
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check harness SPEC consistency
        run: bash scripts/spec-consistency.sh

      - name: Check harness dependency boundaries
        run: bash scripts/dep-boundary-check.sh

      - name: Check harness depgraph snapshot
        run: bash scripts/depgraph-snapshot.sh

      - name: Check Rust tests
        run: cargo test --workspace --locked

      - name: Check Rust docs
        run: cargo doc --no-deps --workspace

      - name: Check harness contracts schema freshness
        run: |
          cargo run -p octopus-harness-contracts --example export_schemas
          git diff --exit-code -- schemas/harness-contracts

      - name: Check schema freshness
        run: pnpm schema:check

      - name: Check version governance
        run: pnpm version:check

      - name: Run desktop release verification
        run: pnpm check:desktop-release

  website-quality-gates:
    name: Website quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check website surfaces
        run: pnpm check:website
