        name: projectId
        required: true
        schema:
          type: string
      - in: path
        name: taskId
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateTaskRequest"
      required: true
    responses:
      "200":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskDetail"
        description: Updated project task payload.
      default:
