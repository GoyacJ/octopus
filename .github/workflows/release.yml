name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  verify-release:
    name: Verify release governance
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare desktop sidecar for Rust workspace checks
        run: pnpm prepare:desktop-backend:sidecar

      - name: Check release tag and repo governance
        run: |
          export RELEASE_TAG="${GITHUB_REF_NAME}"
          pnpm version:check "${RELEASE_TAG}"
          pnpm schema:check
          pnpm check:all

      - name: Generate release notes
        run: pnpm release:notes -- --tag "${GITHUB_REF_NAME}" --sha "${GITHUB_SHA}" --language zh-CN --require-manual-summary true --output tmp/release-notes/${GITHUB_REF_NAME}.md

      - name: Collect release metadata
        run: pnpm release:collect-metadata --output-dir release-artifacts/metadata --notes tmp/release-notes/${GITHUB_REF_NAME}.md

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: octopus-release-metadata
          if-no-files-found: error
          path: release-artifacts/metadata/*

  desktop-release-build:
    name: Desktop release build (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            platform: macos
            runs_on: macos-latest
            target: aarch64-apple-darwin
          - label: macos-x64
            platform: macos
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
          - label: linux-x64
            platform: linux
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - label: windows-x64
            platform: windows
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: windows-arm64
            platform: windows
            runs_on: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop sidecar
        run: node scripts/prepare-desktop-sidecar.mjs

      - name: Build Tauri release bundle (macOS)
        if: matrix.platform == 'macos'
        run: pnpm tauri build --target ${{ matrix.target }} --config apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri release bundle (Linux AppImage + DEB)
        if: matrix.platform == 'linux'
        run: pnpm tauri build --bundles appimage,deb --target x86_64-unknown-linux-gnu --config apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri release bundle (Windows NSIS)
        if: matrix.platform == 'windows'
        run: pnpm tauri build --bundles nsis --target ${{ matrix.target }} --config apps/desktop/src-tauri/tauri.conf.json

      - name: Collect macOS release artifacts
        if: matrix.platform == 'macos'
        run: pnpm release:collect-artifacts --platform macos --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Collect Linux release artifacts
        if: matrix.platform == 'linux'
        run: pnpm release:collect-artifacts --platform linux --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Collect Windows release artifacts
        if: matrix.platform == 'windows'
        run: pnpm release:collect-artifacts --platform windows --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: octopus-desktop-${{ matrix.label }}-bundles
          if-no-files-found: error
          path: release-artifacts/publish/${{ matrix.platform }}

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-release
      - desktop-release-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          name: octopus-release-metadata
          path: release-artifacts/metadata

      - name: Download macOS Apple Silicon bundles
        uses: actions/download-artifact@v4
        with:
          name: octopus-desktop-macos-arm64-bundles
          path: release-artifacts/publish/macos

      - name: Download macOS Intel bundles
        uses: actions/download-artifact@v4
        with:
          name: octopus-desktop-macos-x64-bundles
          path: release-artifacts/publish/macos

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: octopus-desktop-linux-x64-bundles
          path: release-artifacts/publish/linux

      - name: Download Windows x64 bundles
        uses: actions/download-artifact@v4
        with:
          name: octopus-desktop-windows-x64-bundles
          path: release-artifacts/publish/windows

      - name: Download Windows ARM64 bundles
        uses: actions/download-artifact@v4
        with:
          name: octopus-desktop-windows-arm64-bundles
          path: release-artifacts/publish/windows

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release artifacts
        run: pnpm release:verify-artifacts --artifacts-dir release-artifacts --metadata-dir release-artifacts/metadata --notes release-artifacts/metadata/${GITHUB_REF_NAME}.md --checksums release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-artifacts/metadata/${{ github.ref_name }}.md
          make_latest: true
          prerelease: false
          files: |
            release-artifacts/SHA256SUMS.txt
            release-artifacts/metadata/VERSION
            release-artifacts/metadata/octopus.openapi.yaml
            release-artifacts/metadata/generated.ts
            release-artifacts/publish/macos/*
            release-artifacts/publish/linux/*
            release-artifacts/publish/windows/*
