    "http://127.0.0.1",
    "http://localhost",
]
allowedHosts = [
    "127.0.0.1",
    "localhost",
]
sessionPolicy = "session_token"
defaultScopes = [
    "workspace",
    "runtime",
]

[[apps]]
id = "octopus-mobile"
