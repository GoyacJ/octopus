[workspace]
members = ["apps/desktop/src-tauri", "crates/octopus-core"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.77"
license = "MIT"

[workspace.dependencies]
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.10.3" }
tauri-build = { version = "2.5.6" }
tauri-plugin-log = "2.8.0"
tempfile = "3.14"
thiserror = "2.0"
