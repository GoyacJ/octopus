name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  repo-quality-gates:
    name: Repository quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend surfaces
        run: pnpm check:frontend

      - name: Prepare desktop sidecar for Rust workspace checks
        run: pnpm prepare:desktop-backend:sidecar

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Check Rust linting
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check Rust tests
        run: cargo test --workspace --locked

      - name: Check schema freshness
        run: pnpm schema:check

      - name: Check version governance
        run: pnpm version:check

      - name: Run repository verification
        run: pnpm check:all

  desktop-release-build:
    name: Desktop release build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: repo-quality-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop sidecar
        run: node scripts/prepare-desktop-sidecar.mjs

      - name: Build Tauri release bundle
        run: pnpm build:desktop

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: octopus-desktop-macos-bundles
          if-no-files-found: error
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: octopus-desktop-windows-bundles
          if-no-files-found: error
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
