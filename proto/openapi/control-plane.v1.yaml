openapi: 3.1.0
info:
  title: octopus Control Plane API
  version: 1.0.0
  description: >-
    Skeleton control plane contract for the first v1 implementation phases.
servers:
  - url: https://octopus.local/api/v1
tags:
  - name: Workspaces
  - name: Agents
  - name: Runs
  - name: Inbox
  - name: Audit
paths:
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
                required: [items]
  /agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
                required: [items]
  /runs:
    get:
      tags: [Runs]
      summary: List runs
      operationId: listRuns
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Run'
                required: [items]
    post:
      tags: [Runs]
      summary: Create a run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
  /runs/{runId}:
    get:
      tags: [Runs]
      summary: Get a run
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
  /runs/{runId}/timeline:
    get:
      tags: [Runs]
      summary: Get run timeline
      operationId: getRunTimeline
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Timeline events for a run
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimelineEvent'
                required: [items]
  /runs/{runId}/resume:
    post:
      tags: [Runs]
      summary: Resume a waiting run
      operationId: resumeRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeRunRequest'
      responses:
        '202':
          description: Resume accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAcceptance'
  /inbox/items:
    get:
      tags: [Inbox]
      summary: List inbox items
      operationId: listInboxItems
      responses:
        '200':
          description: Inbox item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InboxItem'
                required: [items]
  /audit/events:
    get:
      tags: [Audit]
      summary: List audit events
      operationId: listAuditEvents
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                required: [items]
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      required: [id, name, slug]
    Agent:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        mode:
          type: string
        status:
          type: string
      required: [id, workspaceId, name, mode, status]
    Run:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        agentId:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - waiting_input
            - waiting_approval
            - waiting_trigger
            - completed
            - failed
            - canceled
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, workspaceId, agentId, status, createdAt, updatedAt]
    CreateRunRequest:
      type: object
      properties:
        workspaceId:
          type: string
        agentId:
          type: string
        input:
          type: string
      required: [workspaceId, agentId, input]
    ResumeRunRequest:
      type: object
      properties:
        inboxItemId:
          type: string
        resumeToken:
          type: string
        idempotencyKey:
          type: string
        response:
          $ref: '#/components/schemas/InteractionResponse'
      required: [resumeToken, idempotencyKey, response]
    ResumeAcceptance:
      type: object
      properties:
        accepted:
          type: boolean
        runId:
          type: string
      required: [accepted, runId]
    InteractionResponse:
      type: object
      properties:
        type:
          type: string
          enum: [single_select, multi_select, text, approval]
        values:
          type: array
          items:
            type: string
        text:
          type: string
        approved:
          type: boolean
      required: [type]
    InboxItem:
      type: object
      properties:
        id:
          type: string
        runId:
          type: string
        kind:
          type: string
          enum: [ask_user, approval, resume]
        status:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, kind, status, title, createdAt]
    TimelineEvent:
      type: object
      properties:
        id:
          type: string
        runId:
          type: string
        type:
          type: string
        occurredAt:
          type: string
          format: date-time
        summary:
          type: string
      required: [id, runId, type, occurredAt, summary]
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        actorId:
          type: string
        subjectType:
          type: string
        subjectId:
          type: string
        action:
          type: string
        occurredAt:
          type: string
          format: date-time
      required: [id, subjectType, subjectId, action, occurredAt]
