/api/v1/projects/{projectId}/tasks:
  get:
    operationId: listProjectTasks
    parameters:
      - in: path
        name: projectId
        required: true
        schema:
          type: string
    responses:
      "200":
        content:
          application/json:
            schema:
              items:
                $ref: "#/components/schemas/TaskSummary"
              type: array
        description: Project task list payload.
      default:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiErrorEnvelope"
        description: API error envelope.
  post:
    operationId: createProjectTask
    parameters:
      - in: path
        name: projectId
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateTaskRequest"
      required: true
    responses:
      "200":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskDetail"
        description: Created project task payload.
      default:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiErrorEnvelope"
        description: API error envelope.
