name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  repo-quality-gates:
    name: Repository quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend surfaces
        run: pnpm check:frontend

      - name: Prepare desktop sidecar for Rust workspace checks
        run: pnpm prepare:desktop-backend:sidecar

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Check Rust linting
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check Rust tests
        run: cargo test --workspace --locked

      - name: Check schema freshness
        run: pnpm schema:check

      - name: Check version governance
        run: pnpm version:check

      - name: Run repository verification
        run: pnpm check:all

  desktop-release-build:
    name: Desktop release build (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: repo-quality-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            platform: macos
            runs_on: macos-latest
            target: aarch64-apple-darwin
          - label: macos-x64
            platform: macos
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
          - label: linux-x64
            platform: linux
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - label: windows-x64
            platform: windows
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: windows-arm64
            platform: windows
            runs_on: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop sidecar
        run: node scripts/prepare-desktop-sidecar.mjs

      - name: Build Tauri release bundle (macOS)
        if: matrix.platform == 'macos'
        run: pnpm tauri build --target ${{ matrix.target }} --config apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri release bundle (Linux AppImage + DEB)
        if: matrix.platform == 'linux'
        run: pnpm tauri build --bundles appimage,deb --target x86_64-unknown-linux-gnu --config apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri release bundle (Windows NSIS)
        if: matrix.platform == 'windows'
        run: pnpm tauri build --bundles nsis --target ${{ matrix.target }} --config apps/desktop/src-tauri/tauri.conf.json

      - name: Collect macOS release artifacts
        if: matrix.platform == 'macos'
        run: pnpm release:collect-artifacts --platform macos --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Collect Linux release artifacts
        if: matrix.platform == 'linux'
        run: pnpm release:collect-artifacts --platform linux --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Collect Windows release artifacts
        if: matrix.platform == 'windows'
        run: pnpm release:collect-artifacts --platform windows --source-dir target/${{ matrix.target }}/release/bundle --output-dir release-artifacts/publish

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: octopus-desktop-${{ matrix.label }}-bundles
          if-no-files-found: error
          path: release-artifacts/publish/${{ matrix.platform }}
