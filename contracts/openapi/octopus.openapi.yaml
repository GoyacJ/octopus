          name: action
          schema:
            type: string
        - in: query
          name: resourceType
          schema:
            type: string
        - in: query
          name: outcome
          schema:
            type: string
        - in: query
          name: from
          schema:
            format: int64
            type: integer
        - in: query
          name: to
          schema:
            format: int64
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessAuditListResponse"
          description: Filtered access audit events.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
          description: API error envelope.
