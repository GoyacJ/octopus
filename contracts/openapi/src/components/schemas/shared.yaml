ApiErrorCode:
  enum:
    - UNAUTHENTICATED
    - SESSION_EXPIRED
    - PERMISSION_DENIED
    - AUTHORIZATION_STALE
    - FORBIDDEN
    - NOT_FOUND
    - CONFLICT
    - INVALID_INPUT
    - RATE_LIMITED
    - UNAVAILABLE
    - CAPABILITY_UNSUPPORTED
    - INTERNAL_ERROR
  type: string
ApiErrorDetailEnvelope:
  additionalProperties: false
  properties:
    code:
      $ref: "#/components/schemas/ApiErrorCode"
    details: {}
    message:
      type: string
    requestId:
      type: string
    retryable:
      type: boolean
  required:
    - code
    - message
    - requestId
    - retryable
  type: object
ApiErrorEnvelope:
  additionalProperties: false
  properties:
    error:
      $ref: "#/components/schemas/ApiErrorDetailEnvelope"
  required:
    - error
  type: object
