openapi: 3.1.0
info:
  title: octopus Control Plane API
  version: 1.0.0
  description: >-
    Skeleton control plane contract for the first v1 implementation phases.
  contact:
    name: octopus maintainers
    url: https://github.com/weilaizhihuigu/super-agent
servers:
  - url: https://octopus.local/api/v1
tags:
  - name: Workspaces
  - name: Agents
  - name: Runs
  - name: Inbox
  - name: Audit
paths:
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      description: Return the visible workspace list for the current control-plane session.
      operationId: listWorkspaces
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workspace'
                required: [items]
  /agents:
    get:
      tags: [Agents]
      summary: List agents
      description: Return the governed agent assets that belong to the current workspace scope.
      operationId: listAgents
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
                required: [items]
  /runs:
    get:
      tags: [Runs]
      summary: List runs
      description: Return the most recent runs with their current projected lifecycle status.
      operationId: listRuns
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Run'
                required: [items]
    post:
      tags: [Runs]
      summary: Create a run
      description: Create a minimum Phase 3 run that immediately enters a waiting interaction or approval state.
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
  /runs/{runId}:
    get:
      tags: [Runs]
      summary: Get a run
      description: Return the current run projection for a single run identifier.
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
  /runs/{runId}/timeline:
    get:
      tags: [Runs]
      summary: Get run timeline
      description: Return the projected execution timeline for a run, including waiting and resume state transitions.
      operationId: getRunTimeline
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Timeline events for a run
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimelineEvent'
                required: [items]
  /runs/{runId}/resume:
    post:
      tags: [Runs]
      summary: Resume a waiting run
      description: Resume a waiting run with a governed response payload, resume token, and idempotency key.
      operationId: resumeRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeRunRequest'
      responses:
        '202':
          description: Resume accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAcceptance'
  /inbox/items:
    get:
      tags: [Inbox]
      summary: List inbox items
      description: Return pending and resolved inbox work items for ask-user and approval interactions.
      operationId: listInboxItems
      responses:
        '200':
          description: Inbox item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InboxItem'
                required: [items]
  /audit/events:
    get:
      tags: [Audit]
      summary: List audit events
      description: Return the recorded audit events for run creation, resume handling, and governed operator actions.
      operationId: listAuditEvents
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                required: [items]
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      required: [id, name, slug]
    Agent:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        mode:
          type: string
        status:
          type: string
      required: [id, workspaceId, name, mode, status]
    Run:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        agentId:
          type: string
        interactionType:
          type: string
          enum: [ask_user, approval]
        status:
          type: string
          enum:
            - queued
            - running
            - waiting_input
            - waiting_approval
            - waiting_trigger
            - suspended
            - resuming
            - completed
            - failed
            - canceled
            - handoff
        summary:
          type: string
        input:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, workspaceId, agentId, interactionType, status, summary, input, createdAt, updatedAt]
    CreateRunRequest:
      type: object
      properties:
        workspaceId:
          type: string
        agentId:
          type: string
        input:
          type: string
        interactionType:
          type: string
          enum: [ask_user, approval]
      required: [workspaceId, agentId, input, interactionType]
    ResumeRunRequest:
      type: object
      properties:
        inboxItemId:
          type: string
        resumeToken:
          type: string
        idempotencyKey:
          type: string
        response:
          $ref: '#/components/schemas/InteractionResponse'
      required: [resumeToken, idempotencyKey, response]
    ResumeAcceptance:
      type: object
      properties:
        accepted:
          type: boolean
        deduplicated:
          type: boolean
        runId:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - waiting_input
            - waiting_approval
            - waiting_trigger
            - suspended
            - resuming
            - completed
            - failed
            - canceled
            - handoff
        run:
          $ref: '#/components/schemas/Run'
      required: [accepted, deduplicated, runId, status, run]
    InteractionResponse:
      type: object
      properties:
        type:
          type: string
          enum: [single_select, multi_select, text, approval]
        values:
          type: array
          items:
            type: string
        text:
          type: string
        approved:
          type: boolean
        goalChanged:
          type: boolean
      required: [type]
    InboxItem:
      type: object
      properties:
        id:
          type: string
        runId:
          type: string
        kind:
          type: string
          enum: [ask_user, approval]
        status:
          type: string
          enum: [pending, resolved]
        title:
          type: string
        prompt:
          type: string
        responseType:
          type: string
          enum: [single_select, multi_select, text, approval]
        options:
          type: array
          items:
            type: string
        resumeToken:
          type: string
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
      required: [id, runId, kind, status, title, prompt, responseType, options, resumeToken, createdAt]
    TimelineEvent:
      type: object
      properties:
        id:
          type: string
        runId:
          type: string
        type:
          type: string
        occurredAt:
          type: string
          format: date-time
        summary:
          type: string
      required: [id, runId, type, occurredAt, summary]
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        actorId:
          type: string
        subjectType:
          type: string
        subjectId:
          type: string
        action:
          type: string
        summary:
          type: string
        occurredAt:
          type: string
          format: date-time
      required: [id, actorId, subjectType, subjectId, action, summary, occurredAt]
