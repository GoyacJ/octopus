components:
  schemas:
    AgentRecord:
      additionalProperties: false
      properties:
        avatar:
          type: string
        avatarPath:
          type: string
        builtinToolKeys:
          items:
            type: string
          type: array
        description:
          type: string
        id:
          type: string
        integrationSource:
          additionalProperties: false
          properties:
            kind:
              enum:
                - workspace-link
              type: string
            sourceId:
              type: string
          required:
            - kind
            - sourceId
          type: object
        mcpServerNames:
          items:
            type: string
          type: array
        name:
          type: string
        personality:
          type: string
        projectId:
          type: string
        prompt:
          type: string
        scope:
          $ref: "#/components/schemas/AgentScope"
        skillIds:
          items:
            type: string
          type: array
        status:
          $ref: "#/components/schemas/AgentStatus"
        tags:
          items:
            type: string
          type: array
        updatedAt:
          type: integer
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - scope
        - name
        - personality
        - tags
        - prompt
        - builtinToolKeys
        - skillIds
        - mcpServerNames
        - description
        - status
        - updatedAt
      type: object
    AgentScope:
      enum:
        - personal
        - workspace
        - project
      type: string
    AgentStatus:
      enum:
        - active
        - archived
      type: string
    ApiErrorCode:
      enum:
        - UNAUTHENTICATED
        - SESSION_EXPIRED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - INVALID_INPUT
        - RATE_LIMITED
        - UNAVAILABLE
        - CAPABILITY_UNSUPPORTED
        - INTERNAL_ERROR
      type: string
    ApiErrorDetailEnvelope:
      additionalProperties: false
      properties:
        code:
          $ref: "#/components/schemas/ApiErrorCode"
        details: {}
        message:
          type: string
        requestId:
          type: string
        retryable:
          type: boolean
      required:
        - code
        - message
        - requestId
        - retryable
      type: object
    ApiErrorEnvelope:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ApiErrorDetailEnvelope"
      required:
        - error
      type: object
    ArtifactRecord:
      additionalProperties: false
      properties:
        byteSize:
          type: integer
        contentHash:
          type: string
        contentType:
          type: string
        id:
          type: string
        latestVersion:
          type: integer
        projectId:
          type: string
        status:
          $ref: "#/components/schemas/ArtifactStatus"
        storagePath:
          type: string
        title:
          type: string
        updatedAt:
          type: integer
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - title
        - status
        - latestVersion
        - updatedAt
      type: object
    ArtifactStatus:
      enum:
        - draft
        - review
        - approved
        - published
      type: string
    AuditRecord:
      additionalProperties: false
      properties:
        action:
          type: string
        actorId:
          type: string
        actorType:
          type: string
        createdAt:
          type: integer
        id:
          type: string
        outcome:
          type: string
        projectId:
          type: string
        resource:
          type: string
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - actorType
        - actorId
        - action
        - resource
        - outcome
        - createdAt
      type: object
    AutomationRecord:
      additionalProperties: false
      properties:
        cadence:
          type: string
        description:
          type: string
        id:
          type: string
        lastRunAt:
          type: integer
        nextRunAt:
          type: integer
        output:
          type: string
        ownerId:
          type: string
        ownerType:
          enum:
            - agent
            - team
          type: string
        projectId:
          type: string
        status:
          $ref: "#/components/schemas/AutomationStatus"
        title:
          type: string
        workspaceId:
          type: string
      required:
        - id
        - workspaceId
        - title
        - description
        - cadence
        - ownerType
        - ownerId
        - status
        - output
      type: object
    AutomationStatus:
      enum:
        - active
        - paused
        - error
      type: string
    AvatarUploadPayload:
      additionalProperties: false
      properties:
        byteSize:
          type: integer
        contentType:
          type: string
        dataBase64:
          type: string
        fileName:
          type: string
      required:
        - fileName
        - contentType
        - dataBase64
        - byteSize
      type: object
    BackendConnectionState:
      enum:
        - ready
        - unavailable
      type: string
    BackendTransport:
      enum:
        - http
        - sse
        - ws
      type: string
    BindPetConversationInput:
      additionalProperties: false
      properties:
        conversationId:
          type: string
        petId:
          type: string
        sessionId:
          type: string
      required:
        - petId
        - conversationId
      type: object
    CapabilityDescriptor:
      additionalProperties: false
      properties:
        capabilityId:
          type: string
        label:
          type: string
      required:
        - capabilityId
        - label
      type: object
    ChangeCurrentUserPasswordRequest:
      additionalProperties: false
      properties:
        confirmPassword:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword
        - confirmPassword
      type: object
    ChangeCurrentUserPasswordResponse:
      additionalProperties: false
      properties:
        passwordState:
          $ref: "#/components/schemas/PasswordState"
      required:
        - passwordState
      type: object
    ClientAppRecord:
      additionalProperties: false
      properties:
        allowedHosts:
          items:
            type: string
          type: array
        allowedOrigins:
          items:
            type: string
          type: array
        defaultScopes:
          items:
            type: string
          type: array
        firstParty:
          type: boolean
        id:
          type: string
        name:
          type: string
        platform:
          type: string
        sessionPolicy:
          type: string
        status:
          type: string
      required:
        - id
        - name
        - platform
        - status
        - firstParty
        - allowedOrigins
        - allowedHosts
        - sessionPolicy
        - defaultScopes
      type: object
    ConnectionMode:
      enum:
        - local
        - shared
        - remote
      type: string
    ConnectionProfile:
      additionalProperties: false
      properties:
        baseUrl:
          type: string
        id:
          type: string
        label:
          type: string
        lastSyncAt:
          type: integer
        mode:
          $ref: "#/components/schemas/ConnectionMode"
        state:
          $ref: "#/components/schemas/ConnectionState"
        workspaceId:
          type: string
      required:
        - id
        - mode
        - label
        - workspaceId
        - state
      type: object
    ConnectionState:
      enum:
        - local-ready
        - connected
        - disconnected
      type: string
    ConversationActorKind:
      enum:
        - agent
