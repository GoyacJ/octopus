CaptchaPolicy:
  additionalProperties: false
  properties:
    required:
      type: boolean
    ttlSeconds:
      type: integer
  required:
    - required
    - ttlSeconds
  type: object
EnterprisePrincipal:
  additionalProperties: false
  properties:
    userId:
      type: string
    username:
      type: string
    displayName:
      type: string
    status:
      type: string
  required:
    - userId
    - username
    - displayName
    - status
  type: object
EnterpriseSessionSummary:
  additionalProperties: false
  properties:
    sessionId:
      type: string
    token:
      type: string
    workspaceId:
      type: string
    clientAppId:
      type: string
    status:
      type: string
    createdAt:
      type: integer
    expiresAt:
      type: integer
    principal:
      $ref: "#/components/schemas/EnterprisePrincipal"
  required:
    - sessionId
    - token
    - workspaceId
    - clientAppId
    - status
    - createdAt
    - principal
  type: object
SystemAuthStatus:
  additionalProperties: false
  properties:
    workspace:
      $ref: "#/components/schemas/WorkspaceSummary"
    bootstrapAdminRequired:
      type: boolean
    ownerReady:
      type: boolean
    captcha:
      $ref: "#/components/schemas/CaptchaPolicy"
    session:
      $ref: "#/components/schemas/EnterpriseSessionSummary"
  required:
    - workspace
    - bootstrapAdminRequired
    - ownerReady
    - captcha
  type: object
CaptchaChallenge:
  additionalProperties: false
  properties:
    challengeId:
      type: string
    svgData:
      type: string
    expiresAt:
      type: integer
  required:
    - challengeId
    - svgData
    - expiresAt
  type: object
EnterpriseLoginRequest:
  additionalProperties: false
  properties:
    clientAppId:
      type: string
    username:
      type: string
    password:
      type: string
    captchaChallengeId:
      type: string
    captchaCode:
      type: string
    workspaceId:
      type: string
  required:
    - clientAppId
    - username
    - password
    - captchaChallengeId
    - captchaCode
  type: object
RegisterBootstrapAdminRequest:
  additionalProperties: false
  properties:
    clientAppId:
      type: string
    username:
      type: string
    displayName:
      type: string
    password:
      type: string
    confirmPassword:
      type: string
    avatar:
      $ref: "#/components/schemas/AvatarUploadPayload"
    captchaChallengeId:
      type: string
    captchaCode:
      type: string
    workspaceId:
      type: string
  required:
    - clientAppId
    - username
    - displayName
    - password
    - confirmPassword
    - avatar
    - captchaChallengeId
    - captchaCode
  type: object
EnterpriseAuthSuccess:
  additionalProperties: false
  properties:
    session:
      $ref: "#/components/schemas/EnterpriseSessionSummary"
    workspace:
      $ref: "#/components/schemas/WorkspaceSummary"
  required:
    - session
    - workspace
  type: object
SessionRecord:
  additionalProperties: false
  properties:
    clientAppId:
      type: string
    createdAt:
      type: integer
    expiresAt:
      type: integer
    id:
      type: string
    status:
      $ref: "#/components/schemas/SessionStatus"
    token:
      type: string
    userId:
      type: string
    workspaceId:
      type: string
  required:
    - id
    - workspaceId
    - userId
    - clientAppId
    - token
    - status
    - createdAt
  type: object
SystemBootstrapStatus:
  additionalProperties: false
  properties:
    apiBasePath:
      type: string
    authMode:
      $ref: "#/components/schemas/WorkspaceAuthMode"
    capabilities:
      $ref: "#/components/schemas/WorkspaceCapabilitySet"
    ownerReady:
      type: boolean
    protocolVersion:
      type: string
    registeredApps:
      items:
        $ref: "#/components/schemas/ClientAppRecord"
      type: array
    setupRequired:
      type: boolean
    transportSecurity:
      $ref: "#/components/schemas/TransportSecurityLevel"
    workspace:
      $ref: "#/components/schemas/WorkspaceSummary"
  required:
    - workspace
    - setupRequired
    - ownerReady
    - registeredApps
    - protocolVersion
    - apiBasePath
    - transportSecurity
    - authMode
    - capabilities
  type: object
WorkspaceCapabilitySet:
  additionalProperties: false
  properties:
    eventReplay:
      type: boolean
    idempotency:
      type: boolean
    polling:
      type: boolean
    reconnect:
      type: boolean
    sse:
      type: boolean
  required:
    - polling
    - sse
    - idempotency
    - reconnect
    - eventReplay
  type: object
WorkspaceSummary:
  additionalProperties: false
  properties:
    bootstrapStatus:
      enum:
        - setup_required
        - ready
      type: string
    defaultProjectId:
      type: string
    deployment:
      enum:
        - local
        - remote
      type: string
    host:
      type: string
    id:
      type: string
    listenAddress:
      type: string
    name:
      type: string
    ownerUserId:
      type: string
    slug:
      type: string
  required:
    - id
    - name
    - slug
    - deployment
    - bootstrapStatus
    - host
    - listenAddress
    - defaultProjectId
  type: object
